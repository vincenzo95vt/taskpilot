name: Run TaskPilot Bot (Instagram AutoPost)

on:
  schedule:
    # Ejecuta cada día a las 10:00 y 22:00 hora de España (08:00 y 20:00 UTC)
    - cron: "0 8,20 * * *"
  workflow_dispatch:  # Permite lanzarlo manualmente desde la pestaña "Actions"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: 🎬 Instalar FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg --fix-missing

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔐 Crear archivo credentials.json temporalmente
      - name: 🔑 Crear credenciales de Google
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > credentials.json

      - name: 🚀 Ejecutar bot principal
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          META_USER_TOKEN: ${{ secrets.META_USER_TOKEN }}
          IG_BUSINESS_ACCOUNT: ${{ secrets.IG_BUSINESS_ACCOUNT }}
          TELEGRAM_BOT: ${{ secrets.TELEGRAM_BOT }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
          # ElevenLabs
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          # Cloudinary
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # HuggingFace
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Activar modo Reel
          POST_REEL: ${{ secrets.POST_REEL }}
        run: python bot.py

      # 🧹 Limpieza final
      - name: 🧽 Eliminar credenciales temporales
        if: always()
        run: rm -f credentials.json